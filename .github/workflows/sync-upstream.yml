name: Sync with Upstream

on:
  schedule:
    - cron: '0 0 * * *' # Every night at midnight
  workflow_dispatch:      # Allows you to click "Run" manually

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push back to your fork
    steps:
      - name: Checkout Your Fork
        uses: actions/checkout@v6 # Using the Node 24 version we discussed
        with:
          fetch-depth: 0 # Fetches all history so the merge works correctly

      - name: Sync Logic
        run: |
          # 1. Identity setup
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 2. Add the original developer as a 'remote'
          git remote add upstream https://github.com/thadius83/bambu-to-snapmaker-u1.git
          
          # 3. Pull their latest code
          git fetch upstream
          
          # 4. Merge their main into your main
          # --ff-only ensures it only works if you haven't made custom changes
          git checkout main
          git merge upstream/main --ff-only || git merge upstream/main --no-edit
          
          # 5. Push the updated code back to your fork
          git push origin main
