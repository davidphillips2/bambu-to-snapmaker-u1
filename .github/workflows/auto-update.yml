name: Sync and Publish Image

on:
  schedule:
    - cron: '0 0 * * *' # Checks daily at midnight
  workflow_dispatch:      # Allows manual trigger for testing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Original Upstream
        uses: actions/checkout@v4
        with:
          repository: thadius83/bambu-to-snapmaker-u1 # Targets the original source
          ref: main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push to YOUR Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This pushes to YOUR GitHub packages, even though it built THEIRS
          tags: ghcr.io/${{ github.repository_owner }}/bambu-to-snapmaker-u1:latest
