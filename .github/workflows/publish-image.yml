name: Publish Docker Image

on:
  push:
    branches: ['main', 'filament-remap']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: meta
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/bambu-to-snapmaker-u1:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/${{ github.repository_owner }}/bambu-to-snapmaker-u1:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
